<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --clr-primary: #FF8C42;
    --clr-primary-dark: #E67324;
    --clr-primary-light: #FFB27A;
    --ink: #2A2A2A;
    --ink-faint: rgba(42, 42, 42, 0.12);
    --paper: #FFF9F2;
    --paper-warm: #FFF5EA;
    --border-ink: 2.5px solid #2A2A2A;
    --radius-sketchy: 18px 4px 16px 6px / 6px 16px 4px 18px;
    --shadow-ink: 3px 3px 0 #2A2A2A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #FFF9F2;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }
  .tray-menu {
    background: var(--paper);
    border: var(--border-ink);
    border-radius: var(--radius-sketchy);
    box-shadow: var(--shadow-ink);
    padding: 6px 0;
    min-width: 120px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 12px;
    color: var(--ink);
  }
  .tray-item {
    display: flex;
    align-items: center;
    gap: 7px;
    width: 100%;
    padding: 6px 14px;
    border: none;
    background: none;
    cursor: pointer;
    font: inherit;
    color: inherit;
    text-align: left;
  }
  .tray-item:hover { background: var(--paper-warm); }
  .tray-item:active { background: var(--clr-primary-light); }
  .tray-item .icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
  .tray-item .label { flex: 1; }
  .tray-item .check { font-size: 11px; color: var(--clr-primary-dark); font-weight: 700; width: 14px; text-align: right; }
  .tray-sep { height: 1.5px; background: var(--ink-faint); margin: 4px 10px; }
</style>
</head>
<body>
  <div class="tray-menu" id="menu">
    <button class="tray-item" data-action="pin">
      <span class="icon">📌</span>
      <span class="label">置顶</span>
      <span class="check" id="pin-check"></span>
    </button>
    <button class="tray-item" data-action="settings">
      <span class="icon">⚙️</span>
      <span class="label">设置</span>
    </button>
    <div class="tray-sep"></div>
    <button class="tray-item" data-action="quit">
      <span class="icon">❌</span>
      <span class="label">退出</span>
    </button>
  </div>
  <script>
    const { trayAPI } = window;
    const menu = document.getElementById('menu');
    const pinCheck = document.getElementById('pin-check');

    // Init pinned state
    trayAPI.getState().then(s => { pinCheck.textContent = s.pinned ? '✓' : ''; });

    // Click handlers
    menu.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      trayAPI.action(btn.dataset.action);
    });

    // Live update pin state
    trayAPI.onPinChanged((v) => { pinCheck.textContent = v ? '✓' : ''; });

    // Close on blur
    window.addEventListener('blur', () => trayAPI.action('close'));
  </script>
</body>
</html>
